<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CLAW Outreach</title>
<style>
  :root {
    --bg: #14171a;
    --card: #1c2024;
    --card-border: #2a2f35;
    --text: #eceef0;
    --muted: #8b939c;
    --accent: #d98e4a;
    --accent-dim: #5a4329;
    --danger: #c4685f;
    --radius: 10px;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--sans); }
  body { padding-bottom: calc(96px + env(safe-area-inset-bottom)); }
  .wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px 8px; }

  header.top { padding: 4px 2px 18px; }
  header.top h1 { font-size: 19px; margin: 0 0 4px; letter-spacing: 0.2px; }
  header.top p { font-family: var(--mono); font-size: 12px; color: var(--muted); margin: 0; letter-spacing: 0.2px; }

  .tabs { display: flex; background: var(--card); border: 1px solid var(--card-border); border-radius: 999px; padding: 3px; margin: 16px 0 18px; }
  .tabs button { flex: 1; border: none; background: transparent; color: var(--muted); font-family: var(--sans); font-size: 14px; font-weight: 600; padding: 9px 0; border-radius: 999px; touch-action: manipulation; }
  .tabs button.active { background: var(--accent); color: #1a1208; }

  .section-label { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin: 18px 2px 8px; display: flex; justify-content: space-between; align-items: center; }
  .section-label .reset-link { font-family: var(--mono); color: var(--muted); text-decoration: underline; text-decoration-color: #3a4047; font-size: 11px; background: none; border: none; padding: 4px; }

  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 40px 20px; border: 1px dashed var(--card-border); border-radius: var(--radius); }

  .banner { display: none; align-items: center; justify-content: space-between; gap: 10px; background: #2a2018; border: 1px solid #4a3420; color: #e8c79a; font-size: 12.5px; border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; }
  .banner.show { display: flex; }
  .banner button { font-family: var(--mono); font-size: 11.5px; color: #e8c79a; background: none; border: 1px solid #4a3420; border-radius: 6px; padding: 5px 9px; flex-shrink: 0; }

  .card { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius); margin-bottom: 10px; position: relative; overflow: hidden; }
  .card .trace { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .card .trace::before { content: ""; position: absolute; left: -2px; top: 10px; width: 8px; height: 8px; border-radius: 50%; background: inherit; }

  .card-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 14px 14px 18px; touch-action: manipulation; min-height: 44px; }
  .card-header .titles { min-width: 0; }
  .card-header .company { font-size: 15px; font-weight: 600; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-header .sub { font-family: var(--mono); font-size: 11.5px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pill { font-family: var(--mono); font-size: 10.5px; padding: 4px 9px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
  .chevron { color: var(--muted); font-size: 13px; flex-shrink: 0; transition: transform 0.15s ease; }
  .card.open .chevron { transform: rotate(90deg); }

  .card-body { padding: 4px 16px 16px 18px; display: none; border-top: 1px solid var(--card-border); }
  .card.open .card-body { display: block; }

  .field { margin-top: 12px; }
  .field label { display: block; font-family: var(--mono); font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .field input, .field select, .field textarea {
    width: 100%; background: #15181b; border: 1px solid var(--card-border); color: var(--text);
    border-radius: 8px; padding: 10px 11px; font-size: 16px; font-family: var(--sans); line-height: 1.4;
  }
  .field textarea { resize: none; min-height: 40px; overflow: hidden; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .open-link { display: inline-block; margin-top: 10px; font-family: var(--mono); font-size: 12.5px; color: var(--accent); text-decoration: none; border: 1px solid var(--accent-dim); padding: 7px 12px; border-radius: 8px; }

  .card-actions { display: flex; justify-content: flex-end; margin-top: 16px; }
  .delete-btn { font-family: var(--mono); font-size: 12px; color: var(--muted); background: none; border: none; padding: 8px; }
  .confirm-row { display: flex; align-items: center; gap: 10px; font-size: 12.5px; }
  .confirm-row span { color: var(--muted); font-family: var(--mono); }
  .confirm-row button { font-family: var(--mono); font-size: 12px; border-radius: 8px; padding: 7px 10px; border: 1px solid var(--card-border); background: #15181b; color: var(--text); }
  .confirm-row button.danger { color: var(--danger); border-color: #4a2e2c; }

  .saved-flag { font-family: var(--mono); font-size: 10.5px; color: var(--accent); opacity: 0; transition: opacity 0.4s ease; margin-top: 10px; display: block; }
  .saved-flag.show { opacity: 1; }

  .fab { position: fixed; right: 18px; bottom: calc(20px + env(safe-area-inset-bottom)); width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: #1a1208; border: none; font-size: 26px; line-height: 56px; text-align: center; box-shadow: 0 6px 18px rgba(0,0,0,0.45); touch-action: manipulation; }

  .loading { text-align: center; color: var(--muted); font-family: var(--mono); font-size: 13px; padding: 60px 0; }

  .msg-section { margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--card-border); }
  .msg-section .msg-label { font-family: var(--mono); font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .msg-toggle { display: inline-flex; background: #15181b; border: 1px solid var(--card-border); border-radius: 8px; padding: 2px; margin-bottom: 8px; }
  .msg-toggle button { border: none; background: transparent; color: var(--muted); font-family: var(--mono); font-size: 11.5px; padding: 6px 14px; border-radius: 6px; touch-action: manipulation; }
  .msg-toggle button.active { background: var(--accent-dim); color: var(--accent); }
  .msg-preview { width: 100%; background: #15181b; border: 1px solid var(--card-border); color: var(--text); border-radius: 8px; padding: 10px 11px; font-size: 14px; font-family: var(--sans); line-height: 1.5; resize: none; min-height: 40px; overflow: hidden; }
  .msg-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .msg-actions button { font-family: var(--mono); font-size: 12px; color: var(--accent); background: none; border: 1px solid var(--accent-dim); border-radius: 8px; padding: 8px 12px; touch-action: manipulation; }
  .msg-actions button.secondary { color: var(--muted); border-color: var(--card-border); }
  .reminder-hint { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

  .tpl-help { font-family: var(--mono); font-size: 11px; color: var(--muted); line-height: 1.8; margin: 14px 2px 0; }
  .tpl-help code { color: var(--accent); background: #15181b; border: 1px solid var(--card-border); border-radius: 5px; padding: 1px 6px; }
  .tpl-intro { font-size: 13px; color: var(--muted); line-height: 1.55; margin: 0 2px 4px; }
</style>
</head>
<body>
  <div class="wrap">

<script>
// Persistence layer. The app reads/writes through window.storage with an
// async get/set API. Provide a localStorage-backed implementation so data
// persists in the browser. (Previously this object was never defined, so
// every load fell back to defaults and every save silently failed.)
if (!window.storage) {
  window.storage = {
    async get(key) {
      try {
        const value = localStorage.getItem(key);
        return value === null ? null : { value };
      } catch (e) {
        throw new Error('storage unavailable');
      }
    },
    async set(key, value) {
      localStorage.setItem(key, value);
      return true;
    },
  };
}

const PLATFORM_STATUS_OPTIONS = Object.keys(PLATFORM_STATUS_COLORS);

let state = { tab: 'leads', leads: [], platforms: [], templates: { intro: '', followup: '' }, msgTemplate: 'intro', openId: null, confirmDeleteId: null, confirmReset: false, saveError: false };

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function withIds(arr) { return arr.map(item => Object.assign({ id: uid() }, item)); }
function esc(s) { return (s || '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function loadList(key, fallback) {
  try {
    const res = await window.storage.get(key, false);
    if (res && res.value) {
      const parsed = JSON.parse(res.value);
      if (Array.isArray(parsed) && parsed.length) return parsed;
    }
    throw new Error('empty');
  } catch (e) {
    const seeded = withIds(fallback);
    await saveList(key, seeded);
    return seeded;
  }
}

async function saveList(key, list) {
  try { await window.storage.set(key, JSON.stringify(list), false); state.saveError = false; return true; }
  catch (e) { console.error('Storage save failed', e); state.saveError = true; return false; }
}

function flashSaved(id) {
  const el = document.querySelector('.card[data-id="' + id + '"] .saved-flag');
  if (!el) return;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 900);
}

function selectOptions(options, current) {
  return options.map(o => '<option value="' + esc(o) + '"' + (o === current ? ' selected' : '') + '>' + esc(o) + '</option>').join('');
}

async function loadTemplates() {
  try {
    const res = await window.storage.get('templates', false);
    if (res && res.value) {
      const p = JSON.parse(res.value);
      if (p && typeof p === 'object' && (p.intro || p.followup)) {
        return { intro: p.intro || DEFAULT_TEMPLATES.intro, followup: p.followup || DEFAULT_TEMPLATES.followup };
      }
    }
    throw new Error('empty');
  } catch (e) {
    const t = Object.assign({}, DEFAULT_TEMPLATES);
    await saveTemplates(t);
    return t;
  }
}

async function saveTemplates(t) {
  try { await window.storage.set('templates', JSON.stringify(t), false); state.saveError = false; return true; }
  catch (e) { console.error('Storage save failed', e); state.saveError = true; return false; }
}

// Replace {placeholders} in a template with a lead's details.
function fillTemplate(tpl, lead) {
  const first = ((lead.contactName || '').trim().split(/\s+/)[0]) || 'there';
  const map = {
    firstName: first,
    contactName: (lead.contactName || '').trim() || 'there',
    company: (lead.company || '').trim() || 'your company',
    role: (lead.role || '').trim(),
    source: (lead.source || '').trim(),
    nextAction: (lead.nextAction || '').trim()
  };
  return (tpl || '').replace(/\{(\w+)\}/g, (m, k) => (k in map ? map[k] : m));
}

async function copyText(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) { await navigator.clipboard.writeText(text); return true; }
  } catch (e) { /* fall through to legacy path */ }
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    const ok = document.execCommand('copy');
    ta.remove();
    return ok;
  } catch (e) { return false; }
}

function flashCopied(id) {
  const el = document.querySelector('.card[data-id="' + id + '"] .copy-flag');

}

// --- Calendar reminders (.ics) -------------------------------------------
// Real iPhone notifications without a backend: download a calendar event with
// an alarm on the follow-up date. iOS opens it in Calendar, and the phone
// notifies you at that time.
function icsEsc(s) {
  return (s || '').toString().replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\r?\n/g, '\\n');
}

function leadEventLines(lead) {
  const day = (lead.followUpDate || '').replace(/-/g, ''); // YYYYMMDD
  const start = day + 'T090000'; // 9:00 AM local (floating time)
  const end = day + 'T093000';
  const stamp = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
  const summary = 'Outreach follow-up: ' + (lead.company || 'lead');
  const descParts = [];
  if (lead.contactName) descParts.push('Contact: ' + lead.contactName + (lead.role ? ' (' + lead.role + ')' : ''));
  if (lead.nextAction) descParts.push('Next action: ' + lead.nextAction);
  if (lead.contactInfo) descParts.push(lead.contactInfo);
  return [
    'BEGIN:VEVENT',
    'UID:' + lead.id + '@claw-outreach',
    'DTSTAMP:' + stamp,
    'DTSTART:' + start,
    'DTEND:' + end,
    'SUMMARY:' + icsEsc(summary),
    'DESCRIPTION:' + icsEsc(descParts.join('\n')),
    'BEGIN:VALARM',
    'ACTION:DISPLAY',
    'DESCRIPTION:' + icsEsc(summary),
    'TRIGGER:PT0S',
    'END:VALARM',
    'END:VEVENT'
  ];
}

function downloadICS(filename, eventBlocks) {
  const lines = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//CLAW Outreach//EN', 'CALSCALE:GREGORIAN']
    .concat([].concat.apply([], eventBlocks))
    .concat(['END:VCALENDAR']);
  const blob = new Blob([lines.join('\r\n')], { type: 'text/calendar' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function addLeadReminder(lead) {
  if (!lead.followUpDate) {
    alert('Set a “Follow-up date” for this lead first, then tap Add reminder.');
    return;
  }
  const safe = (lead.company || 'lead').replace(/[^a-z0-9]+/gi, '-').toLowerCase();
  downloadICS('followup-' + safe + '.ics', [leadEventLines(lead)]);
}

function exportAllReminders() {
  const dated = state.leads.filter(l => l.followUpDate);
  if (!dated.length) {
    alert('No leads have a follow-up date yet. Add follow-up dates, then export.');
    return;
  }
  downloadICS('claw-followups.ics', dated.map(leadEventLines));
}

        '<div class="field"><label>Why it&rsquo;s a fit</label><textarea data-field="whyFit" data-autosize="1">' + esc(item.whyFit) + '</textarea></div>' +
        '<div class="row2">' +
          '<div class="field"><label>Date contacted</label><input type="date" data-field="dateContacted" value="' + esc(item.dateContacted) + '" /></div>' +
          '<div class="field"><label>Follow-up date</label><input type="date" data-field="followUpDate" value="' + esc(item.followUpDate) + '" /></div>' +
        '</div>' +
        '<div class="field"><label>Next action</label><textarea data-field="nextAction" data-autosize="1">' + esc(item.nextAction) + '</textarea></div>' +
        '<div class="field"><label>Notes</label><textarea data-field="notes" data-autosize="1">' + esc(item.notes) + '</textarea></div>' +
        '<span class="saved-flag">Saved</span>' +
        '<div class="msg-section">' +
          '<div class="msg-label">Outreach message</div>' +
          '<div class="msg-toggle">' +
            '<button data-action="msg-tpl" data-tpl="intro" class="' + (state.msgTemplate === 'intro' ? 'active' : '') + '">Intro</button>' +
            '<button data-action="msg-tpl" data-tpl="followup" class="' + (state.msgTemplate === 'followup' ? 'active' : '') + '">Follow-up</button>' +
          '</div>' +
          '<textarea class="msg-preview" data-autosize="1" readonly>' + esc(fillTemplate(state.templates[state.msgTemplate], item)) + '</textarea>' +
          '<div class="msg-actions">' +
            '<button data-action="copy-msg">Copy message</button>' +
            '<button data-action="add-reminder" class="secondary">&#128197; Add reminder</button>' +
          '</div>' +
          '<span class="copy-flag saved-flag">Copied to clipboard</span>' +
          (item.followUpDate ? '' : '<div class="reminder-hint">Tip: set a follow-up date above to enable a calendar reminder.</div>') +
        '</div>' +
        '<div class="card-actions">' +
          (confirming
            ? '<div class="confirm-row"><span>Delete this lead?</span><button data-action="delete-no">No</button><button class="danger" data-action="delete-yes">Yes, delete</button></div>'
            : '<button class="delete-btn" data-action="delete-ask">Remove lead</button>') +
        '</div>' +
      '</div>' +
    '</div>'
  );
}

function platformCardHTML(item) {
  const open = state.openId === item.id;
  const color = PLATFORM_STATUS_COLORS[item.status] || PLATFORM_STATUS_COLORS['Not Started'];
  const confirming = state.confirmDeleteId === item.id;
  return (
    '<div class="card' + (open ? ' open' : '') + '" data-id="' + item.id + '">' +
      '<div class="trace" style="background:' + color + '"></div>' +
      '<div class="card-header" data-action="toggle">' +
        '<div class="titles">' +
          '<div class="company">' + (esc(item.name) || 'Untitled platform') + '</div>' +
          '<div class="sub">' + esc(item.type) + '</div>' +
        '</div>' +
        '<span class="pill" style="background:' + color + '22;color:' + color + ';border:1px solid ' + color + '55">' + esc(item.status) + '</span>' +
        '<span class="chevron">&#8250;</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="field"><label>Name</label><input type="text" data-field="name" value="' + esc(item.name) + '" /></div>' +
        '<div class="row2">' +
          '<div class="field"><label>Type</label><select data-field="type">' + selectOptions(PLATFORM_TYPE_OPTIONS, item.type) + '</select></div>' +
          '<div class="field"><label>Status</label><select data-field="status">' + selectOptions(PLATFORM_STATUS_OPTIONS, item.status) + '</select></div>' +
        '</div>' +
        '<div class="field"><label>Date applied / created</label><input type="date" data-field="dateApplied" value="' + esc(item.dateApplied) + '" /></div>' +
        '<div class="field"><label>URL</label><input type="text" data-field="url" value="' + esc(item.url) + '" /></div>' +
        (item.url ? '<a class="open-link" href="' + esc(item.url) + '" target="_blank" rel="noopener">Open site &#8599;</a>' : '') +
        '<div class="field"><label>Notes</label><textarea data-field="notes" data-autosize="1">' + esc(item.notes) + '</textarea></div>' +
        '<span class="saved-flag">Saved</span>' +
        '<div class="card-actions">' +
          (confirming
            ? '<div class="confirm-row"><span>Remove this platform?</span><button data-action="delete-no">No</button><button class="danger" data-action="delete-yes">Yes, remove</button></div>'
            : '<button class="delete-btn" data-action="delete-ask">Remove platform</button>') +
        '</div>' +
      '</div>' +
    '</div>'
  );
}

function render() {
  document.getElementById('save-banner').classList.toggle('show', state.saveError);

  const content = document.getElementById('content');
  document.getElementById('tab-leads').classList.toggle('active', state.tab === 'leads');
  document.getElementById('tab-platforms').classList.toggle('active', state.tab === 'platforms');
  document.getElementById('tab-templates').classList.toggle('active', state.tab === 'templates');
  document.getElementById('fab').style.display = state.tab === 'templates' ? 'none' : 'block';

  const resetLabel = state.confirmReset
    ? '<span class="confirm-row" style="display:inline-flex"><span>Reset all?</span><button data-action="reset-no">No</button><button class="danger" data-action="reset-yes">Yes</button></span>'
    : '<button class="reset-link" data-action="reset-ask">Reset to defaults</button>';

  let html = '';

  if (state.tab === 'templates') {
    html += '<div class="section-label"><span>Message templates</span>' + resetLabel + '</div>';
    html += '<p class="tpl-intro">Edit your outreach messages here. The placeholders below are filled in automatically when you copy a message from a lead.</p>';
    html += '<div class="card open"><div class="card-body" style="border-top:none">' +
      '<div class="field"><label>Intro message</label><textarea data-tpl-field="intro" data-autosize="1">' + esc(state.templates.intro) + '</textarea></div>' +
      '<div class="field"><label>Follow-up message</label><textarea data-tpl-field="followup" data-autosize="1">' + esc(state.templates.followup) + '</textarea></div>' +
      '<div class="tpl-help">Available placeholders:<br>' +
        '<code>{firstName}</code> <code>{contactName}</code> <code>{company}</code> <code>{role}</code> <code>{source}</code> <code>{nextAction}</code></div>' +
      '<span class="saved-flag">Saved</span>' +
    '</div></div>';
    content.innerHTML = html;
    content.querySelectorAll('textarea[data-autosize]').forEach(t => { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; });
    return;
  }

  const isLeads = state.tab === 'leads';
  const list = isLeads ? state.leads : state.platforms;

  html += '<div class="section-label"><span>' + (isLeads ? list.length + ' lead' + (list.length === 1 ? '' : 's') : list.length + ' platform' + (list.length === 1 ? '' : 's')) + '</span>' + resetLabel + '</div>';

  if (isLeads && state.leads.some(l => l.followUpDate)) {
    html += '<div class="msg-actions" style="margin:0 2px 12px"><button data-action="export-all">&#128197; Add all follow-ups to calendar</button></div>';
  }

  if (!list.length) {
    html += '<div class="empty">' + (isLeads ? 'No leads yet. Tap + to add one.' : 'No platforms yet. Tap + to add one.') + '</div>';
  } else {
    html += list.map(isLeads ? leadCardHTML : platformCardHTML).join('');
  }
  content.innerHTML = html;

  content.querySelectorAll('textarea[data-autosize]').forEach(t => {
    t.style.height = 'auto';
    t.style.height = (t.scrollHeight) + 'px';
  });
}

async function updateField(listKey, id, field, value) {
  const list = state[listKey];
  const item = list.find(x => x.id === id);
  if (!item) return;
  item[field] = value;
  await saveList(listKey, list);
  if (!state.saveError) flashSaved(id);
  if (field === 'status' || field === 'company' || field === 'contactName' || field === 'name' || field === 'role' || field === 'type' || field === 'url' || field === 'followUpDate' || field === 'nextAction' || state.saveError) {
    render();
  }
}

function attachListeners() {
  const content = document.getElementById('content');

  content.addEventListener('click', async (e) => {
    const header = e.target.closest('[data-action="toggle"]');
    if (header) {
      const card = header.closest('.card');
      const id = card.dataset.id;
      state.openId = state.openId === id ? null : id;
      state.confirmDeleteId = null;
      render();
      return;
    }
    const askDel = e.target.closest('[data-action="delete-ask"]');
    if (askDel) {
      state.confirmDeleteId = askDel.closest('.card').dataset.id;
      render();
      return;
    }
    const noDel = e.target.closest('[data-action="delete-no"]');
    if (noDel) { state.confirmDeleteId = null; render(); return; }

    const yesDel = e.target.closest('[data-action="delete-yes"]');
    if (yesDel) {
      const id = yesDel.closest('.card').dataset.id;
      const key = state.tab === 'leads' ? 'leads' : 'platforms';
      state[key] = state[key].filter(x => x.id !== id);
      state.confirmDeleteId = null;
      if (state.openId === id) state.openId = null;
      await saveList(key, state[key]);
      render();
      return;
    }

    const msgTpl = e.target.closest('[data-action="msg-tpl"]');
    if (msgTpl) { state.msgTemplate = msgTpl.dataset.tpl; render(); return; }

    const copyMsg = e.target.closest('[data-action="copy-msg"]');
    if (copyMsg) {
      const id = copyMsg.closest('.card').dataset.id;
      const lead = state.leads.find(x => x.id === id);
      if (lead) {
        const ok = await copyText(fillTemplate(state.templates[state.msgTemplate], lead));
        if (ok) flashCopied(id);
        else alert('Could not copy automatically — select the message text and copy it manually.');
      }
      return;
    }

    const addRem = e.target.closest('[data-action="add-reminder"]');
    if (addRem) {
      const id = addRem.closest('.card').dataset.id;
      const lead = state.leads.find(x => x.id === id);
      if (lead) addLeadReminder(lead);
      return;
    }

    const exportAll = e.target.closest('[data-action="export-all"]');
    if (exportAll) { exportAllReminders(); return; }

    const askReset = e.target.closest('[data-action="reset-ask"]');
    if (askReset) { state.confirmReset = true; render(); return; }
    const noReset = e.target.closest('[data-action="reset-no"]');
    if (noReset) { state.confirmReset = false; render(); return; }
    const yesReset = e.target.closest('[data-action="reset-yes"]');
    if (yesReset) {
      if (state.tab === 'templates') {
        state.templates = Object.assign({}, DEFAULT_TEMPLATES);
        state.confirmReset = false;
        await saveTemplates(state.templates);
        render();
        return;
      }
      const key = state.tab === 'leads' ? 'leads' : 'platforms';
      const fallback = state.tab === 'leads' ? DEFAULT_LEADS : DEFAULT_PLATFORMS;
      state[key] = withIds(fallback);
      state.confirmReset = false;
      state.openId = null;
      await saveList(key, state[key]);
      render();
      return;
    }
  });

  content.addEventListener('change', (e) => {
    const el = e.target;
    if (el.matches('select[data-field], input[type="date"][data-field]')) {
      const id = el.closest('.card').dataset.id;
      const key = state.tab === 'leads' ? 'leads' : 'platforms';
      updateField(key, id, el.dataset.field, el.value);
    }
  });

  content.addEventListener('focusout', async (e) => {
    const el = e.target;
    if (el.matches('input[type="text"][data-field], textarea[data-field]')) {
      const id = el.closest('.card').dataset.id;
      const key = state.tab === 'leads' ? 'leads' : 'platforms';
      updateField(key, id, el.dataset.field, el.value);
    } else if (el.matches('textarea[data-tpl-field]')) {
      state.templates[el.dataset.tplField] = el.value;
      await saveTemplates(state.templates);
      const flag = content.querySelector('.saved-flag');
      if (flag && !state.saveError) { flag.classList.add('show'); setTimeout(() => flag.classList.remove('show'), 900); }
      if (state.saveError) render();
    }
  });

  content.addEventListener('input', (e) => {
    const el = e.target;
    if (el.matches('textarea[data-autosize]')) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    }
  });

  document.getElementById('retry-save').addEventListener('click', async () => {
    await saveList('leads', state.leads);
    if (!state.saveError) await saveList('platforms', state.platforms);
    render();
  });

  document.getElementById('tab-leads').addEventListener('click', () => {
    state.tab = 'leads'; state.openId = null; state.confirmDeleteId = null; state.confirmReset = false; render();
  });
  document.getElementById('tab-platforms').addEventListener('click', () => {
    state.tab = 'platforms'; state.openId = null; state.confirmDeleteId = null; state.confirmReset = false; render();
  });
  document.getElementById('tab-templates').addEventListener('click', () => {
    state.tab = 'templates'; state.openId = null; state.confirmDeleteId = null; state.confirmReset = false; render();
  });

  document.getElementById('fab').addEventListener('click', async () => {
    const key = state.tab === 'leads' ? 'leads' : 'platforms';
    const blank = state.tab === 'leads'
      ? { company: '', contactName: '', role: '', source: 'Cold Outreach', contactInfo: '', whyFit: '', status: 'Not Started', dateContacted: '', followUpDate: '', nextAction: '', notes: '' }
      : { name: '', type: 'Marketplace', status: 'Not Started', dateApplied: '', url: '', notes: '' };
    const item = Object.assign({ id: uid() }, blank);
    state[key].push(item);
    state.openId = item.id;
    await saveList(key, state[key]);
    render();
    const card = document.querySelector('.card[data-id="' + item.id + '"]');
    if (card && typeof card.scrollIntoView === 'function') card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
}

async function init() {
  state.leads = await loadList('leads', DEFAULT_LEADS);
  state.platforms = await loadList('platforms', DEFAULT_PLATFORMS);
  state.templates = await loadTemplates();
  attachListeners();
  render();
}

init();
</script>
</body>
</html>
